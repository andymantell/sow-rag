<!DOCTYPE html>
<html lang="en" class="govuk-template">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoW Improver</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/govuk-frontend.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ── Full-height application layout overrides ─────────────── */
    html.govuk-template,
    .govuk-template__body {
      height: 100%;
      overflow: hidden;
    }
    .govuk-template__body {
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    /* Remove max-width constraint from header so it spans full viewport */
    .govuk-header .govuk-width-container {
      max-width: none;
      margin: 0;
      padding-left: 15px;
      padding-right: 15px;
    }

    /* ── Status bar ─────────────────────────────────────────────── */
    .app-status-bar {
      background: #f3f2f1;
      border-bottom: 1px solid #b1b4b6;
      padding: 4px 15px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .app-status-bar__info {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 13px;
      color: #505a5f;
    }
    .app-status-bar__sep {
      color: #b1b4b6;
    }
    #model-name {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 13px;
      color: #505a5f;
    }
    #status-badge {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 13px;
      color: #505a5f;
    }

    /* ── Content layout: sidebar + main ──────────────────────── */
    .app-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Definition sidebar ───────────────────────────────────── */
    .app-sidebar {
      width: 550px;
      min-width: 38px;
      background: #ffffff;
      border-right: 4px solid #1d70b8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.2s ease;
    }
    .app-sidebar.collapsed { width: 38px; }
    .app-sidebar.collapsed .app-sidebar__title,
    .app-sidebar.collapsed .app-sidebar__body { display: none; }

    .app-sidebar__header {
      padding: 10px 12px 10px 15px;
      background: #1d70b8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
      white-space: nowrap;
      min-height: 38px;
    }
    .app-sidebar__title {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
    }
    .app-sidebar__toggle {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      color: #ffffff;
      cursor: pointer;
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 11px;
      padding: 2px 7px;
      flex-shrink: 0;
      transition: border-color 0.1s;
    }
    .app-sidebar__toggle:hover { border-color: #ffffff; }
    .app-sidebar__toggle:focus { outline: 3px solid #ffdd00; outline-offset: 0; }

    .app-sidebar__body {
      flex: 1;
      overflow-y: auto;
      padding: 15px 18px 20px 15px;
    }

    /* Definition markdown typography */
    .app-sidebar__body h1 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: #0b0c0c;
      margin: 0 0 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #1d70b8;
      line-height: 1.3;
    }
    .app-sidebar__body h2 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #1d70b8;
      margin: 20px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .app-sidebar__body h3 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #0b0c0c;
      margin: 12px 0 4px;
    }
    .app-sidebar__body p,
    .app-sidebar__body li {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      color: #0b0c0c;
      line-height: 1.5;
    }
    .app-sidebar__body p { margin: 0 0 10px; }
    .app-sidebar__body ul,
    .app-sidebar__body ol { margin: 0 0 10px 20px; }
    .app-sidebar__body li { margin-bottom: 4px; }
    .app-sidebar__body strong { font-weight: 700; }

    /* ── Main content area ────────────────────────────────────── */
    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      background: #f3f2f1;
    }

    /* ── Toolbar (upload) ─────────────────────────────────────── */
    .app-toolbar {
      background: #ffffff;
      border-bottom: 1px solid #b1b4b6;
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .app-toolbar__row {
      display: flex;
      align-items: flex-end;
      gap: 15px;
      flex-wrap: wrap;
    }
    .app-toolbar__file {
      flex: 1;
      min-width: 280px;
    }
    /* Override govuk-file-upload full-width */
    .app-toolbar__file .govuk-file-upload {
      max-width: 100%;
    }
    /* Tighten govuk-label margin in toolbar context */
    .app-toolbar .govuk-label {
      margin-bottom: 4px;
    }
    .app-toolbar .govuk-form-group {
      margin-bottom: 0;
    }
    .app-toolbar__actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 2px; /* align with file input baseline */
    }
    /* Remove bottom margin from button in toolbar */
    .app-toolbar .govuk-button {
      margin-bottom: 0;
    }
    #spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid #b1b4b6;
      border-top-color: #1d70b8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #upload-error {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      color: #d4351c;
      font-weight: 700;
    }

    /* ── Annotations (what changed) ──────────────────────────── */
    .app-annotations {
      display: none;
      flex-shrink: 0;
      background: #ffffff;
      border-top: 1px solid #b1b4b6;
      padding: 8px 20px;
    }
    .app-annotations.visible { display: block; }
    .app-annotations .govuk-details { margin: 0; }
    .annotation-item {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      color: #0b0c0c;
      padding: 8px 0;
      border-bottom: 1px solid #f3f2f1;
    }
    .annotation-item:last-child { border-bottom: none; }
    .annotation-item__title {
      font-weight: 700;
      color: #1d70b8;
      margin-bottom: 4px;
    }
    .annotation-item__bullets {
      margin: 0;
      padding-left: 20px;
    }
    .annotation-item__bullets li { margin-bottom: 2px; }

    /* ── Diff area ────────────────────────────────────────────── */
    .app-diff-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    #diff-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #f3f2f1;
    }
    #diff-placeholder .govuk-body-l {
      color: #505a5f;
    }

    #diff-panels {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #diff-panels.visible { display: flex; }

    .diff-header-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #ffffff;
      border-bottom: 2px solid #1d70b8;
      flex-shrink: 0;
    }
    .diff-col-header {
      padding: 8px 20px;
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #0b0c0c;
    }
    .diff-col-header + .diff-col-header {
      border-left: 1px solid #b1b4b6;
    }

    .diff-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }
    .diff-col {
      background: #ffffff;
      overflow-y: auto;
      padding: 25px 30px;
      line-height: 1.6;
    }
    .diff-col + .diff-col {
      border-left: 1px solid #b1b4b6;
    }

    /* Document typography in diff panels — GOV.UK scale */
    .diff-col h1 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
      color: #0b0c0c;
      margin: 0 0 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #b1b4b6;
    }
    .diff-col h2 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      color: #0b0c0c;
      margin: 25px 0 10px;
    }
    .diff-col h3 {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #0b0c0c;
      margin: 15px 0 8px;
    }
    .diff-col p {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 16px;
      color: #0b0c0c;
      margin: 0 0 15px;
    }
    .diff-col ul, .diff-col ol {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 16px;
      color: #0b0c0c;
      margin: 0 0 15px 20px;
    }
    .diff-col li { margin-bottom: 5px; }
    .diff-col strong { font-weight: 700; }

    /* Diff marks — GOV.UK status colour tints */
    ins {
      background: #cce2d8;
      color: #005a30;
      text-decoration: none;
      padding: 1px 2px;
    }
    del {
      background: #f6d7d2;
      color: #6e1208;
      text-decoration: line-through;
      padding: 1px 2px;
    }

    /* ── Sources (govuk-details) ──────────────────────────────── */
    .app-sources {
      display: none;
      flex-shrink: 0;
      background: #ffffff;
      border-top: 1px solid #b1b4b6;
      padding: 8px 20px;
    }
    .app-sources.visible { display: block; }
    .app-sources .govuk-details {
      margin: 0;
    }
    .source-item {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      color: #0b0c0c;
      padding: 6px 0;
      border-bottom: 1px solid #f3f2f1;
    }
    .source-item:last-child { border-bottom: none; }
    .source-item strong { color: #1d70b8; }

    /* ── Loading spinner for definition ──────────────────────── */
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 40px 20px;
    }
    .app-loading__ring {
      width: 40px; height: 40px;
      border: 4px solid #b1b4b6;
      border-top-color: #1d70b8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .app-loading__text {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 14px;
      color: #505a5f;
    }
  </style>
</head>

<body class="govuk-template__body">

        </a>
      </div>
    </div>
  </header>

  <!-- ── Status bar ── -->
  <div class="app-status-bar">
    <div class="app-status-bar__info">
      <span id="model-name"></span>
      <span class="app-status-bar__sep" aria-hidden="true">·</span>
      <span id="status-badge">Loading</span>
    </div>
  </div>

  <!-- ── Application body ── -->
  <div class="app-content">

    <!-- Definition sidebar -->
    <div class="app-sidebar" id="def-aside">
      <div class="app-sidebar__header">
        <span class="app-sidebar__title">Definition of Good</span>
        <button class="app-sidebar__toggle" id="def-toggle" type="button" title="Collapse panel">◀</button>
      </div>
      <div class="app-sidebar__body" id="definition-content">
        <div class="app-loading">
          <div class="app-loading__ring"></div>
          <p class="app-loading__text">Generating definition of good…</p>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <main class="app-main" id="main-content">

      <!-- Upload toolbar -->
      <div class="app-toolbar">
        <div class="app-toolbar__row">
          <div class="app-toolbar__file">
            <div class="govuk-form-group" id="file-form-group">
              <label class="govuk-label" for="file-input">Upload SoW PDF</label>
              <input class="govuk-file-upload" type="file" id="file-input" name="file" accept="application/pdf">
            </div>
          </div>
          <div class="app-toolbar__actions">
            <button class="govuk-button" id="improve-btn" disabled>Improve document</button>
            <div id="spinner"></div>
            <span id="upload-error"></span>
          </div>
        </div>
      </div>

      <!-- What changed annotations -->
      <div class="app-annotations" id="annotations-section">
        <details class="govuk-details" id="annotations-details">
          <summary class="govuk-details__summary">
            <span class="govuk-details__summary-text">What was improved</span>
          </summary>
          <div class="govuk-details__text" id="annotations-list"></div>
        </details>
      </div>

      <!-- Diff area -->
      <div class="app-diff-area">

        <div id="diff-placeholder">
          <p class="govuk-body-l">Upload a SoW PDF and click <strong>Improve document</strong> to see results.</p>
        </div>

        <div id="diff-panels">
          <div class="diff-header-row">
            <div class="diff-col-header">Original</div>
            <div class="diff-col-header">Improved</div>
          </div>
          <div class="diff-cols">
            <div class="diff-col" id="col-original"></div>
            <div class="diff-col" id="col-improved"></div>
          </div>
        </div>

        <!-- Sources -->
        <div class="app-sources" id="sources-section">
          <details class="govuk-details" id="sources-details">
            <summary class="govuk-details__summary">
              <span class="govuk-details__summary-text">Sources used from corpus</span>
            </summary>
            <div class="govuk-details__text" id="sources-list"></div>
          </details>
        </div>

      </div>
    </main>

  </div><!-- /.app-content -->

  <script src="https://cdn.jsdelivr.net/npm/govuk-frontend@6.1.0/dist/govuk/govuk-frontend.min.js"></script>
  <script>
    window.GOVUKFrontend.initAll();
  </script>
  <script>
    // ── Marked configuration ──────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    // ── State ─────────────────────────────────────────────────────────────────
    let definitionReady = false;

    // ── Status polling ────────────────────────────────────────────────────────
    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error('status ' + res.status);
        const data = await res.json();

        const badge = document.getElementById('status-badge');
        document.getElementById('model-name').textContent =
          (data.isLocal ? 'Local' : 'Cloud') + ' · ' + (data.modelName || '');

        if (data.isReady) {
          badge.textContent = `Ready · ${data.documentCount} doc(s) · ${data.chunkCount} chunks`;
          badge.style.color = '#00703c';
          definitionReady = true;
          document.getElementById('improve-btn').disabled = false;
          loadDefinition();
        } else {
          badge.textContent = 'Generating definition…';
          badge.style.color = '#505a5f';
          setTimeout(pollStatus, 2000);
        }
      } catch (e) {
        const badge = document.getElementById('status-badge');
        badge.textContent = 'Error: ' + e.message;
        badge.style.color = '#d4351c';
        setTimeout(pollStatus, 5000);
      }
    }

    // ── Load definition ───────────────────────────────────────────────────────
    async function loadDefinition() {
      try {
        const res = await fetch('/api/definition');
        if (!res.ok) throw new Error('status ' + res.status);
        const md = await res.text();
        document.getElementById('definition-content').innerHTML = marked.parse(md);
      } catch (e) {
        document.getElementById('definition-content').innerHTML =
          `<p class="govuk-error-message">Failed to load definition: ${escapeHtml(e.message)}</p>`;
      }
    }

    // ── Improve button ────────────────────────────────────────────────────────
    document.getElementById('improve-btn').addEventListener('click', async () => {
      const fileInput = document.getElementById('file-input');
      const errEl    = document.getElementById('upload-error');
      errEl.textContent = '';

      if (!fileInput.files.length) {
        errEl.textContent = 'Please select a PDF file.';
        return;
      }

      const btn     = document.getElementById('improve-btn');
      const spinner = document.getElementById('spinner');
      btn.disabled = true;
      spinner.style.display = 'block';

      const form = new FormData();
      form.append('file', fileInput.files[0]);

      try {
        const res  = await fetch('/api/improve', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || data.title || 'Improvement failed.';
          return;
        }
        renderResult(data);
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    });

    // ── Render result ─────────────────────────────────────────────────────────
    function renderResult(data) {
      const { originalHtml, improvedHtml } = buildDiffHtml(data.original || '', data.improved || '');
      document.getElementById('col-original').innerHTML = originalHtml;
      document.getElementById('col-improved').innerHTML = improvedHtml;

      document.getElementById('diff-placeholder').style.display = 'none';
      document.getElementById('diff-panels').classList.add('visible');

      renderAnnotations(data.annotations || []);
      renderSources(data.chunksUsed || []);
    }

    // ── Render both sides ─────────────────────────────────────────────────────
    // Word/line-level diffing cannot be safely applied to either raw markdown
    // (breaks table pipe syntax) or rendered HTML (diffWords splits tag tokens
    // like '<', 'h3', '>' causing orphaned fragments). Render each side
    // independently — the side-by-side layout is sufficient for visual comparison.
    function buildDiffHtml(original, improved) {
      return {
        originalHtml: marked.parse(original),
        improvedHtml: marked.parse(improved)
      };
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Annotations ───────────────────────────────────────────────────────────
    function renderAnnotations(annotations) {
      const section = document.getElementById('annotations-section');
      const list    = document.getElementById('annotations-list');

      if (!annotations.length) { section.classList.remove('visible'); return; }

      list.innerHTML = annotations.map(a => {
        // The explanation is bullet points starting with '-'; render as a <ul>
        const bullets = a.explanation
          .split('\n')
          .map(l => l.trim())
          .filter(l => l.startsWith('-'))
          .map(l => `<li>${escapeHtml(l.slice(1).trim())}</li>`)
          .join('');
        const fallback = bullets
          ? `<ul class="annotation-item__bullets">${bullets}</ul>`
          : `<p>${escapeHtml(a.explanation)}</p>`;
        return `<div class="annotation-item">
          <div class="annotation-item__title">${escapeHtml(a.sectionTitle)}</div>
          ${fallback}
        </div>`;
      }).join('');

      section.classList.add('visible');
    }

    // ── Sources ───────────────────────────────────────────────────────────────
    function renderSources(chunks) {
      const section = document.getElementById('sources-section');
      const list    = document.getElementById('sources-list');

      if (!chunks.length) { section.classList.remove('visible'); return; }

      list.innerHTML = chunks.map(c => `
        <div class="source-item">
          <strong>${escapeHtml(c.sourceFile)}</strong><br>
          ${escapeHtml(c.snippet)}
        </div>`).join('');

      section.classList.add('visible');
    }

    // ── Definition panel collapse ─────────────────────────────────────────────
    document.getElementById('def-toggle').addEventListener('click', () => {
      const aside = document.getElementById('def-aside');
      const btn   = document.getElementById('def-toggle');
      const collapsed = aside.classList.toggle('collapsed');
      btn.textContent = collapsed ? '▶' : '◀';
      btn.title = collapsed ? 'Expand panel' : 'Collapse panel';
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    pollStatus();
  </script>

</body>
</html>
